<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Frontier - 地图编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="panel">
        <h1 class="title">地图编辑器</h1>

        <section class="group">
          <h2>背景图</h2>
          <div class="row">
            <input id="bgFile" type="file" accept="image/*" />
          </div>
          <div class="row">
            <input id="bgUrl" type="text" placeholder="或输入图片 URL（https://...）" />
            <button id="loadUrlBtn" type="button">加载</button>
          </div>
          <div class="row">
            <label class="label">透明度</label>
            <input id="bgOpacity" type="range" min="0" max="100" step="1" value="100" />
            <span id="bgOpacityText" class="mono">100</span>
          </div>
          <div class="row">
            <label class="checkbox">
              <input id="embedBg" type="checkbox" checked />
              <span>保存时嵌入背景（dataURL）</span>
            </label>
          </div>
        </section>

        <section class="group">
          <h2>网格</h2>
          <div class="row">
            <label class="label">cellSize</label>
            <input id="cellSize" type="number" min="4" step="1" value="40" />
            <button id="rebuildGridBtn" type="button">重建</button>
          </div>
          <div class="row">
            <label class="checkbox">
              <input id="showGrid" type="checkbox" checked />
              <span>显示网格</span>
            </label>
            <label class="checkbox">
              <input id="showWalkable" type="checkbox" checked />
              <span>显示可走格</span>
            </label>
          </div>
        </section>

        <section class="group">
          <h2>工具</h2>
          <div class="row">
            <select id="tool">
              <option value="paint">刷子：绘制可走</option>
              <option value="erase">刷子：擦除可走</option>
              <option value="hero">标记：英雄起点</option>
              <option value="castle">标记：城堡位置</option>
              <option value="spawn_add">敌方出生点：添加</option>
              <option value="spawn_remove">敌方出生点：删除</option>
            </select>
          </div>
          <div class="row">
            <label class="label">刷子尺寸</label>
            <input id="brushSize" type="range" min="1" max="15" step="1" value="1" />
            <span id="brushSizeText" class="mono">1</span>
          </div>
          <div class="row">
            <button id="undoBtn" type="button">撤销 (Ctrl+Z)</button>
            <button id="redoBtn" type="button">重做 (Ctrl+Y)</button>
          </div>
        </section>

        <section class="group">
          <h2>数据</h2>
          <div class="row">
            <button id="saveBtn" type="button">导出 JSON</button>
            <input id="loadJson" type="file" accept="application/json,.json" />
          </div>
          <div class="row">
            <textarea id="jsonText" rows="10" spellcheck="false" placeholder="这里会显示当前地图 JSON（可复制/粘贴后点击“从文本加载”）"></textarea>
          </div>
          <div class="row">
            <button id="loadFromTextBtn" type="button">从文本加载</button>
            <button id="clearBtn" type="button">清空</button>
          </div>
        </section>

        <section class="group">
          <h2>状态</h2>
          <div id="status" class="status"></div>
        </section>
      </aside>

      <main class="stage">
        <div class="canvasWrap">
          <canvas id="canvas"></canvas>
        </div>
        <div class="hint">
          <div>左键拖动：刷子绘制/擦除</div>
          <div>滚轮：缩放；空格+拖动：平移</div>
          <div>Ctrl+Z / Ctrl+Y：撤销/重做</div>
        </div>
      </main>
    </div>

    <script src="./editor.js?v=2"></script>
  </body>
</html>

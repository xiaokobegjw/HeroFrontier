<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Frontier - 地图编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="panel">
        <h1 class="title">地图编辑器</h1>

        <section class="group">
          <h2>背景图</h2>
          <div class="row">
            <input id="bgFile" type="file" accept="image/*" />
          </div>
          <div class="row">
            <input id="bgUrl" type="text" placeholder="或输入图片 URL（https://...）" />
            <button id="loadUrlBtn" type="button">加载</button>
          </div>
          <div class="row">
            <input id="bgCcPath" type="text" placeholder="或输入 Cocos resources 路径（例如 maps/bg 或 assets/resources/maps/bg.png）" />
            <button id="loadCcPathBtn" type="button">使用</button>
          </div>
          <div class="row">
            <label class="label">透明度</label>
            <input id="bgOpacity" type="range" min="0" max="100" step="1" value="100" />
            <span id="bgOpacityText" class="mono">100</span>
          </div>
          <div class="row">
            <label class="checkbox">
              <input id="embedBg" type="checkbox" checked />
              <span>保存时嵌入背景（dataURL）</span>
            </label>
          </div>
        </section>

        <section class="group">
          <h2>网格</h2>
          <div class="row">
            <label class="label">cellSize</label>
            <input id="cellSize" type="number" min="4" step="1" value="40" />
            <button id="rebuildGridBtn" type="button">重建</button>
          </div>
          <div class="row">
            <label class="checkbox">
              <input id="showGrid" type="checkbox" checked />
              <span>显示网格</span>
            </label>
          </div>
        </section>

        <section class="group">
          <h2>工具</h2>
          <div class="row">
            <select id="tool">
              <option value="path_start">路径：起点（出怪口）</option>
              <option value="path_end">路径：终点（基地）</option>
              <option value="waypoint_add">路径：添加路点</option>
              <option value="waypoint_remove">路径：删除路点</option>
              <option value="hero">标记：英雄出生点</option>
              <option value="base">标记：基地位置</option>
              <option value="tower_add">标记：炮塔位（添加）</option>
              <option value="tower_remove">标记：炮塔位（删除）</option>
              <option value="obstacle_add">不可通行：添加（单格）</option>
              <option value="obstacle_rect_add">不可通行：添加（矩形）</option>
              <option value="obstacle_remove">不可通行：删除</option>
            </select>
          </div>
          <div class="row">
            <button id="undoBtn" type="button">撤销 (Ctrl+Z)</button>
            <button id="redoBtn" type="button">重做 (Ctrl+Y)</button>
          </div>
        </section>

        <section class="group">
          <h2>不可通行</h2>
          <div class="row">
            <button id="clearObstaclesBtn" type="button">清空不可通行</button>
          </div>
          <div class="row">
            <div id="obstacleList" class="waypointList"></div>
          </div>
        </section>

        <section class="group">
          <h2>炮塔位</h2>
          <div class="row">
            <button id="clearTowersBtn" type="button">清空炮塔位</button>
          </div>
          <div class="row">
            <div id="towerList" class="waypointList"></div>
          </div>
        </section>

        <section class="group">
          <h2>路径</h2>
          <div class="row">
            <label class="label">当前</label>
            <select id="pathSelect"></select>
          </div>
          <div class="row">
            <button id="addPathBtn" type="button">新建路径</button>
            <button id="renamePathBtn" type="button">重命名</button>
            <button id="deletePathBtn" type="button">删除路径</button>
          </div>
          <div class="row">
            <button id="clearPathBtn" type="button">清空路径</button>
            <button id="clearWaypointsBtn" type="button">清空路点</button>
            <button id="reverseWaypointsBtn" type="button">反转路点</button>
          </div>
          <div class="row">
            <div id="waypointList" class="waypointList"></div>
          </div>
        </section>

        <section class="group">
          <h2>波次</h2>
          <div class="row">
            <label class="label">当前</label>
            <select id="waveSelect"></select>
          </div>
          <div class="row">
            <button id="addWaveBtn" type="button">新建波次</button>
            <button id="renameWaveBtn" type="button">重命名</button>
            <button id="deleteWaveBtn" type="button">删除波次</button>
          </div>
          <div class="row">
            <label class="label">delay(上波后)</label>
            <input id="waveStartAt" type="number" min="0" step="0.1" value="0" />
          </div>
          <div class="row">
            <label class="label">总数量</label>
            <span id="waveTotalCount" class="mono" style="width:auto;text-align:left">0</span>
            <span class="mono" style="width:auto;text-align:left">时长</span>
            <span id="waveSpawnDuration" class="mono" style="width:auto;text-align:left">0</span>
          </div>
          <div class="row">
            <button id="addGroupBtn" type="button">添加出怪组</button>
          </div>
          <div class="row">
            <div id="groupList" class="groupList"></div>
          </div>
        </section>

        <section class="group">
          <h2>数据</h2>
          <div class="row">
            <button id="saveBtn" type="button">导出 JSON</button>
            <input id="loadJson" type="file" accept="application/json,.json" />
          </div>
          <div class="row">
            <textarea id="jsonText" rows="10" spellcheck="false" placeholder="这里会显示当前地图 JSON（可复制/粘贴后点击“从文本加载”）"></textarea>
          </div>
          <div class="row">
            <button id="loadFromTextBtn" type="button">从文本加载</button>
            <button id="clearBtn" type="button">清空</button>
          </div>
        </section>

        <section class="group">
          <h2>状态</h2>
          <div id="status" class="status"></div>
        </section>
      </aside>

      <main class="stage">
        <div class="canvasWrap">
          <canvas id="canvas"></canvas>
        </div>
        <div class="hint">
          <div>左键：放置/删除路径点（取决于当前工具）</div>
          <div>滚轮：缩放；空格+拖动：平移</div>
          <div>Ctrl+Z / Ctrl+Y：撤销/重做</div>
        </div>
      </main>
    </div>

    <script src="./editor.js?v=7"></script>
  </body>
</html>
